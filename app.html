function RABOUT(){return'<div style="padding:14px 0"><div style="padding:0 16px;margin-bottom:12px"><h2 style="font-family:Fredoka;font-size:22px">\u{1F4D6} About ReadQuest</h2><span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#FF6B35,#FF8F65);color:#fff">MVP v0.5 \u2022 Early Preview</span></div><div class="ab"><h3>\u{1F31F} What is ReadQuest?</h3><p>ReadQuest is an interactive reading platform that creates personalized, illustrated stories for children of all reading levels. Every story is unique \u2014 crafted in real-time and shaped by YOUR choices.</p><p>Unlike traditional reading apps that serve the same content to every child, ReadQuest adapts to each reader\u2019s level, interests, and pace. Stories include embedded vocabulary, comprehension checks, and moral decision points that build both literacy and character.</p></div><div class="ab" style="background:linear-gradient(135deg,#FFF0E8,#FFF8E1)"><h3>\u{1F4DA} How It Helps Children</h3><div class="fr"><div class="fi">\u{1F3A8}</div><div><b>Personalized Illustrated Stories</b><span>ReadQuest creates stories AND illustrations calibrated to your child\u2019s reading level, with vocabulary that stretches without overwhelming.</span></div></div><div class="fr"><div class="fi">\u{1F914}</div><div><b>Interactive Decision-Making</b><span>Children make choices that shape the story, including moral and empathetic decisions that develop critical thinking and character.</span></div></div><div class="fr"><div class="fi">\u{1F331}</div><div><b>Natural Vocabulary Building</b><span>New words are woven into stories. Tap any word for its definition. Words grow in the Word Garden as mastery increases through spaced repetition.</span></div></div><div class="fr"><div class="fi">\u{1F525}</div><div><b>Proven Habit-Building</b><span>Streaks, XP, achievements, and daily challenges use Duolingo-style engagement mechanics to build consistent daily reading habits.</span></div></div></div><div class="ab" style="background:linear-gradient(135deg,#E8FAF8,#ECFDF5)"><h3>\u{1F468}\u200D\u{1F469}\u200D\u{1F467} For Parents</h3><div class="fr"><div class="fi">\u{1F4CA}</div><div><b>Reading Analytics Dashboard</b><span>See reading level, vocabulary growth, stories completed, comprehension trends, and genre preferences \u2014 all in one view.</span></div></div><div class="fr"><div class="fi">\u{1F4A1}</div><div><b>Actionable Recommendations</b><span>The full version provides personalized strategies to support your child\u2019s reading development based on their unique learning profile.</span></div></div><div class="fr"><div class="fi">\u26A0\uFE0F</div><div><b>Early Warning Signals</b><span>Advanced analytics will monitor patterns that may indicate reading difficulties like dyslexia, flagging them early for professional evaluation.</span></div></div></div><div class="ab" style="background:linear-gradient(135deg,#FFF8E1,#FFEFCC)"><h3>\u{1F3EB} For Educators</h3><div class="fr"><div class="fi">\u{1F4CB}</div><div><b>Classroom Tools (Coming)</b><span>Assign stories aligned to curriculum, track student progress, and generate standards-aligned reading reports.</span></div></div><div class="fr"><div class="fi">\u{1F9E0}</div><div><b>Learning Profile Database</b><span>Anonymized data identifies which strategies work best for different learners \u2014 powering better outcomes for all children.</span></div></div></div><div class="ab" style="background:linear-gradient(135deg,#F0EDFF,#E8E0FF)"><h3>\u{1F52C} Advanced Analytics (Full Version)</h3><p>The complete ReadQuest platform will capture and analyze:</p><div class="fr"><div class="fi">\u{1F4C8}</div><div><b>Reading Fluency & Comprehension</b><span>Session timing, comprehension scores, recall accuracy, and pace trends mapped to grade-level standards.</span></div></div><div class="fr"><div class="fi">\u{1F4D6}</div><div><b>Vocabulary Acquisition & Retention</b><span>Words encountered, looked up, and mastered. Spaced repetition ensures long-term retention. Progress mapped to standards.</span></div></div><div class="fr"><div class="fi">\u2764\uFE0F</div><div><b>Social-Emotional Development</b><span>Patterns in moral and empathetic decisions reveal character development and emotional reasoning growth over time.</span></div></div><div class="fr"><div class="fi">\u{1F50D}</div><div><b>Reading Disability Detection</b><span>Persistent patterns in decoding speed, comprehension gaps, or phonemic awareness flag potential dyslexia or other difficulties early.</span></div></div></div><div class="ab"><h3>\u{1F6E4}\uFE0F The ReadQuest Roadmap</h3><p>This early preview demonstrates the core concept. The full platform will include:</p><p>\u2022 Read-aloud mode with speech recognition for fluency assessment<br>\u2022 Family co-reading with shared rewards and goals<br>\u2022 Classroom management and teacher dashboards<br>\u2022 Structured intervention pathways for struggling readers<br>\u2022 Creator Mode for advanced readers to write their own stories<br>\u2022 Multiple languages (Spanish, French, and more)<br>\u2022 Native iOS and Android apps<br>\u2022 Learning Profile Database powering literacy research</p><p style="margin-top:10px;font-weight:700;color:#FF6B35">Our mission: Ignite a lifelong love of reading in every child by making stories personal, interactive, and adaptive.</p></div><div class="cd" style="background:#F3F4F6;text-align:center"><p style="font-size:12px;color:#636E72">\u{1F512} <b>Privacy First:</b> In this MVP, all data stays on your device. The full version will be fully COPPA-compliant with verifiable parental consent, encrypted data, and full parental control.</p><p style="font-size:11px;color:#9CA3AF;margin-top:8px">ReadQuest MVP v0.5 \u2022 Powered by ReadQuest \u2022 Illustrations by Pollinations.ai \u2022 \u00A9 2026</p></div></div>'}
